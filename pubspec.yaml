name: tienda_ropa
description: Men's Locker Clothing Ec. - E-commerce Application
publish_to: 'none'
version: 1.0.0+1
# repository: https://github.com/my_org/my_repo

environment:
  sdk: '>=3.1.5 <4.0.0'

#---------Packages------------#
dependencies:
  flutter:
    sdk: flutter



  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # Utility Packages
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^2.6.2
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1
  connectivity_plus: ^7.0.0
  lottie: ^3.3.2
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  clipboard: ^3.0.14
  flutter_dropzone: ^4.2.1
  flutter_typeahead: ^5.2.0
  multi_select_flutter: ^4.1.3

  # Product Specific
  readmore: ^3.0.0
  carousel_slider: ^5.1.2
  flutter_rating_bar: ^4.0.1
  capped_progress_indicator: ^0.0.2
  flutter_svg: ^2.2.3

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  google_sign_in: ^7.2.0
  cloud_functions: ^6.0.6

  # Web Specific
  web: ^1.1.1
  html: ^0.15.6
  fl_chart: ^1.1.1
  data_table_2: ^2.7.2
  url_strategy: ^0.3.0
  universal_html: ^2.3.0

#--------------- ./ PACKAGES END ------------------#

  args: any
  cached_network_image: ^3.4.1
  share_plus: ^12.0.1
dev_dependencies:
  build_runner: ^2.11.1
  build_web_compilers: ^4.4.12
  lints: ^6.1.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  #------------------Local Assets------------------#
  assets:
    - assets/logos/
    - assets/icons/brands/
    - assets/images/animations/
    - assets/images/on_boarding_images/
    - assets/icons/categories/
    - assets/images/banners/
    - assets/images/products/
    - assets/images/content/
    - assets/images/reviews/
    - assets/icons/payment_methods/

  #----------------Local Fonts-------------------#
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800

# Configuración del ícono de la aplicación
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/LogoRedondoLightLogin.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logos/LogoRedondoLightLogin.png"
  windows:
    generate: true
    image_path: "assets/logos/LogoRedondoLightLogin.png"
  macos:
    generate: true
    image_path: "assets/logos/LogoRedondoLightLogin.png"

